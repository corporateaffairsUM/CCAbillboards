<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UM Weather Billboard – Full Info</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        /* ─── BILLBOARD – FULL WIDTH ─── */
        .billboard {
            width: 960px;
            height: 720px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            padding: 30px 40px 30px 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── HEADER – LOGO + TITLE ─── */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 18px;
            border-bottom: 3px solid #1a2a6c;
            padding-bottom: 10px;
            flex-shrink: 0;
        }
        .header .logo {
            height: 60px;
            width: auto;
            flex-shrink: 0;
        }
        .header .city {
            font-size: 35px;
            font-weight: 900;
            color: #1a2a6c;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            flex: 1;
            text-align: left;
        }

        /* ─── MAIN GRID ─── */
        .main-grid {
            flex: 1;
            display: flex;
            gap: 40px;
            align-items: stretch;
        }

        /* ═══ LEFT COLUMN – CURRENT WEATHER ─══ */
        .current-weather {
            flex: 1.5;
            background: #f8f9fa;
            border-radius: 24px;
            padding: 10px 14px 28px;
            border: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: top;
            text-align: center;
        }
        .current-weather .icon {
            font-size: 110px;
            line-height: 1;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.10));
            margin-bottom: -15px;
        }
        .current-weather .temp {
            font-size: 150px;
            font-weight: 900;
            color: #0b1a3a;
            letter-spacing: -6px;
            line-height: 1;
            margin-top: -20px;
        }
        .current-weather .temp sup {
            font-size: 38px;
            font-weight: 400;
            top: -28px;
            color: #555;
        }
        .current-weather .condition {
            font-size: 30px;
            font-weight: 700;
            color: #1e3a5f;
            text-transform: capitalize;
            margin-top: -2px;
            letter-spacing: 0.5px;
        }
        .current-weather .details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-top: 8px;
            width: 100%;
        }
        .current-weather .details span {
            background: #ffffff;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid #dee2e6;
            font-size: 20px;
            font-weight: 600;
            color: #1e3a5f;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            flex: 1 0 auto;
        }
        .current-weather .details .label {
            font-weight: 400;
            color: #6c757d;
            margin-right: 4px;
        }

        /* ═══ RIGHT COLUMN ─── */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ─── AQI BOX ─── */
        .aqi-box {
            border-radius: 24px;
            padding: 18px 10px 14px;
            text-align: center;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            background: #1f8b4c;
            flex-shrink: 0;
        }
        .aqi-box .aqi-label {
			color: #000000;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.9;
        }
        .aqi-box .aqi-value {
			color: #000000;
            font-size: 76px;
            font-weight: 900;
            line-height: 1;
            margin-top: -6px;
            letter-spacing: 4px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
        }
        .aqi-box .aqi-desc {
			color: #000000;
            font-size: 20px;
            font-weight: 600;
            opacity: 0.95;
            letter-spacing: 1px;
        }
        .aqi-box .aqi-credit {
			color: #000000;
            font-size: 11px;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ─── FORECAST (4‑DAY) ─── */
        .forecast {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            gap: 8px;
            background: #f8f9fa;
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid #e9ecef;
        }
        .forecast .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border-radius: 16px;
            padding: 10px 24px;
            font-size: 22px;
            font-weight: 600;
            color: #1a2a4a;
            border: 1px solid #e9ecef;
            min-height: 58px;
        }
        .forecast .day-row .day-name {
            width: 85px;
            font-weight: 800;
            font-size: 22px;
            color: #1a2a6c;
        }
        .forecast .day-row .day-icon {
            font-size: 38px;
            line-height: 1;
            width: 55px;
            text-align: center;
            filter: drop-shadow(0 1px 4px rgba(0, 0, 0, 0.06));
        }
        .forecast .day-row .day-temps {
            font-weight: 700;
            font-size: 24px;
            color: #0b1a3a;
            letter-spacing: 1px;
        }
        .forecast .day-row .day-temps .hi {
            color: #c0392b;
        }
        .forecast .day-row .day-temps .lo {
            color: #2c6b9e;
        }
        .forecast .day-row .day-temps span {
            margin: 0 4px;
            color: #adb5bd;
        }

        /* ─── RESPONSIVE SCALING ─── */
        @media (max-width: 980px) {
            .billboard {
                transform: scale(0.85);
            }
        }
        @media (max-width: 820px) {
            .billboard {
                transform: scale(0.7);
            }
        }
        @media (max-width: 680px) {
            .billboard {
                transform: scale(0.55);
            }
        }
        @media (max-width: 540px) {
            .billboard {
                transform: scale(0.42);
            }
        }
        .billboard::-webkit-scrollbar {
            display: none;
        }

        /* ─── Loading / Error States ─── */
        .loading-text {
            font-size: 20px;
            color: #7f8c8d;
            text-align: center;
            padding: 12px 0;
        }
        .api-not-ready {
            font-size: 22px;
            font-weight: 700;
            color: #e74c3c;
            text-align: center;
            padding: 18px 0;
            background: #fdf0ef;
            border-radius: 14px;
            border: 1px solid #f5c6cb;
        }
        .error-text {
            font-size: 18px;
            color: #e74c3c;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="billboard" id="app">

        <!-- HEADER – LOGO + TITLE -->
        <div class="header">
			<div class="city">Weather CheECck!!!</div>
            <img src="Logo UM-01.png" alt="UM Logo" class="logo" id="logoImage" />
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">

            <!-- LEFT: Current Weather -->
            <div class="current-weather" id="currentWeather">
                <span class="icon" id="currentIcon">☁️</span>
                <div class="temp" id="currentTemp">--<sup>°C</sup></div>
                <div class="condition" id="currentCondition">loading…</div>
                <div class="details" id="currentDetails">
                    <span><span class="label">Feels</span> <span id="feelsLike">--</span>°C</span>
                    <span><span class="label">Humidity</span> <span id="humidity">--</span>%</span>
                    <span><span class="label">Wind</span> <span id="windSpeed">--</span> km/h</span>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="right-col">

                <!-- AQI Box -->
                <div class="aqi-box" id="aqiBox">
                    <div class="aqi-label">Air Quality Index</div>
                    <div class="aqi-value" id="aqiValue">--</div>
                    <div class="aqi-desc" id="aqiDesc">loading…</div>
                    <div class="aqi-credit">Real‑time data • IQAir</div>
                </div>

                <!-- Forecast -->
                <div class="forecast" id="forecastContainer">
                    <div class="loading-text">Fetching forecast…</div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // ─── CONSOLE LOG TO CONFIRM SCRIPT LOADS ──────────────────
        console.log('✅ Script loaded successfully!');

        // ─── API KEYS ──────────────────────────────────────────────
        const OWM_KEY = '96a9d62bbe7be4ad886c3d0c2fca59e3';
        const IQAIR_KEY = 'f2d845b5-4d9e-41a9-8124-0a5ba98e59d6';
        const LAT = 3.1209;
        const LON = 101.6534;
        const UNITS = 'metric';

        // ─── DOM refs ──────────────────────────────────────────────
        const currentIcon = document.getElementById('currentIcon');
        const currentTemp = document.getElementById('currentTemp');
        const currentCondition = document.getElementById('currentCondition');
        const feelsLike = document.getElementById('feelsLike');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const forecastContainer = document.getElementById('forecastContainer');
        const aqiValue = document.getElementById('aqiValue');
        const aqiDesc = document.getElementById('aqiDesc');
        const aqiBox = document.getElementById('aqiBox');

        // ─── helpers ───────────────────────────────────────────────
        function getDayName(ts) {
            const d = new Date(ts * 1000);
            return d.toLocaleDateString('en-US', { weekday: 'short' });
        }

        function weatherIconToEmoji(iconCode) {
            const map = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌧️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return map[iconCode] || '🌤️';
        }

        // ─── US AQI Level Mapping (0–500 scale) ──────────────────
        function getAqiLevel(aqi) {
            if (aqi <= 50) return { color: '#1f8b4c', label: 'Good' };
            if (aqi <= 100) return { color: '#f1c40f', label: 'Moderate' };
            if (aqi <= 150) return { color: '#e67e22', label: 'Unhealthy for Sensitive Groups' };
            if (aqi <= 200) return { color: '#e74c3c', label: 'Unhealthy' };
            if (aqi <= 300) return { color: '#8e44ad', label: 'Very Unhealthy' };
            return { color: '#7f0f0f', label: 'Hazardous' };
        }

        // ─── Show error state ──────────────────────────────────────
        function showError(message) {
            console.error('❌ Error displayed to user:', message);
            currentIcon.textContent = '⚠️';
            currentTemp.innerHTML = '--<sup>°C</sup>';
            currentCondition.textContent = '⚠️ ' + message;
            feelsLike.textContent = '--';
            humidity.textContent = '--';
            windSpeed.textContent = '--';

            forecastContainer.innerHTML = `
                <div class="api-not-ready">⚠️ ${message}</div>
            `;

            aqiValue.textContent = '--';
            aqiDesc.textContent = 'unavailable';
            aqiBox.style.background = '#95a5a6';
        }

        // ─── fetch & update ────────────────────────────────────────
        async function fetchWeather() {
            console.log('🌤️ fetchWeather() called at', new Date().toLocaleTimeString());

            try {
                // ─── 1) CURRENT WEATHER ───
                console.log('📡 Fetching current weather from OpenWeatherMap...');
                const currentRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=${UNITS}&appid=${OWM_KEY}`
                );
                if (!currentRes.ok) {
                    let msg = `HTTP ${currentRes.status}`;
                    if (currentRes.status === 401) msg = 'OWM API key invalid';
                    else if (currentRes.status === 429) msg = 'Rate limit exceeded';
                    throw new Error(msg);
                }
                const currentData = await currentRes.json();

                const temp = Math.round(currentData.main.temp);
                currentTemp.innerHTML = `${temp}<sup>°C</sup>`;
                currentCondition.textContent = currentData.weather[0].description;
                currentIcon.textContent = weatherIconToEmoji(currentData.weather[0].icon);

                feelsLike.textContent = Math.round(currentData.main.feels_like);
                humidity.textContent = Math.round(currentData.main.humidity);
                const windKmh = Math.round(currentData.wind.speed * 3.6);
                windSpeed.textContent = windKmh;

                // ─── 2) 5‑DAY FORECAST – FIXED: DAILY MIN/MAX ───
                console.log('📡 Fetching forecast from OpenWeatherMap...');
                const forecastRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&units=${UNITS}&appid=${OWM_KEY}`
                );
                if (!forecastRes.ok) {
                    let msg = `HTTP ${forecastRes.status}`;
                    if (forecastRes.status === 401) msg = 'OWM API key invalid';
                    throw new Error(msg);
                }
                const forecastData = await forecastRes.json();

                // Group entries by day
                const dailyMap = new Map();
                for (const entry of forecastData.list) {
                    const date = new Date(entry.dt * 1000);
                    const dayKey = date.toISOString().split('T')[0];
                    if (!dailyMap.has(dayKey)) {
                        dailyMap.set(dayKey, []);
                    }
                    dailyMap.get(dayKey).push(entry);
                }

                const todayKey = new Date().toISOString().split('T')[0];
                const sortedDays = Array.from(dailyMap.keys()).sort();
                const futureDays = sortedDays.filter(d => d > todayKey).slice(0, 4);

                let forecastHTML = '';
                futureDays.forEach((dayKey) => {
                    const entries = dailyMap.get(dayKey);

                    // ─── FIND TRUE DAILY MAX & MIN ───
                    let dailyMax = -100;
                    let dailyMin = 100;
                    let bestIcon = '🌤️';
                    let bestDesc = '';

                    for (const e of entries) {
                        const tempMax = e.main.temp_max;
                        const tempMin = e.main.temp_min;
                        if (tempMax > dailyMax) dailyMax = tempMax;
                        if (tempMin < dailyMin) dailyMin = tempMin;
                        // Use the icon from midday (12:00) or the first entry if no midday
                        const h = new Date(e.dt * 1000).getHours();
                        if (h >= 11 && h <= 13) {
                            bestIcon = weatherIconToEmoji(e.weather[0].icon);
                            bestDesc = e.weather[0].description;
                        }
                    }
                    // Fallback: if no midday entry, use the first one
                    if (!bestDesc && entries.length > 0) {
                        bestIcon = weatherIconToEmoji(entries[0].weather[0].icon);
                        bestDesc = entries[0].weather[0].description;
                    }

                    const hi = Math.round(dailyMax);
                    const lo = Math.round(dailyMin);
                    const name = getDayName(entries[0].dt);

                    forecastHTML += `
                        <div class="day-row">
                            <span class="day-name">${name}</span>
                            <span class="day-icon">${bestIcon}</span>
                            <span class="day-temps"><span class="hi">${hi}°</span> <span>/</span> <span class="lo">${lo}°</span></span>
                        </div>
                    `;
                });

                while (futureDays.length < 4) {
                    forecastHTML += `
                        <div class="day-row">
                            <span class="day-name">---</span>
                            <span class="day-icon">🌧️</span>
                            <span class="day-temps"><span class="hi">--°</span> <span>/</span> <span class="lo">--°</span></span>
                        </div>
                    `;
                }
                forecastContainer.innerHTML = forecastHTML;

                // ─── 3) AIR QUALITY (IQAir) ───
                console.log('📡 Fetching air quality from IQAir...');
                const iqairRes = await fetch(
                    `https://api.airvisual.com/v2/nearest_city?lat=${LAT}&lon=${LON}&key=${IQAIR_KEY}`
                );

                if (!iqairRes.ok) {
                    let msg = `IQAir HTTP ${iqairRes.status}`;
                    if (iqairRes.status === 401) msg = 'IQAir API key invalid or not activated yet';
                    else if (iqairRes.status === 429) msg = 'IQAir rate limit exceeded (5 calls/min)';
                    throw new Error(msg);
                }

                const iqairData = await iqairRes.json();
                if (iqairData.status !== 'success') {
                    throw new Error('IQAir API returned error: ' + (iqairData.data?.message || 'Unknown'));
                }

                const aqiValueNum = iqairData.data.current.pollution.aqius;
                aqiValue.textContent = aqiValueNum;
                const level = getAqiLevel(aqiValueNum);
                aqiDesc.textContent = level.label;
                aqiBox.style.background = level.color;

                console.log('🎉 All data updated successfully!');

            } catch (error) {
                console.error('❌ fetchWeather() caught an error:', error.message);
                if (error.message.includes('IQAir')) {
                    aqiValue.textContent = '?';
                    aqiDesc.textContent = 'AQI unavailable';
                    aqiBox.style.background = '#95a5a6';
                } else {
                    showError('API is not ready: ' + error.message);
                }
            }
        }

        // ─── auto‑update ──────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM fully loaded, starting fetch...');
            fetchWeather();
            setInterval(fetchWeather, 30 * 60 * 1000);
        });
    </script>

</body>
</html>
